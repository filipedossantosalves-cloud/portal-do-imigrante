name: Security and data audit

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate JavaScript syntax
        shell: bash
        run: |
          find . -path './.git' -prune -o -name '*.js' -print0 \
            | xargs -0 -n1 node --check

      - name: Audit data and public pages
        run: node scripts/audit-project.js
